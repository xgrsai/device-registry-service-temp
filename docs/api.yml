openapi: 3.0.3

info:
  title: Dummy API
  version: 1.0.0

servers:
  - url: http://localhost:4010

paths:
  /hello:
    get:
      summary: Returns a greeting
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hello, world!"